name: CD — Deploy to EKS via Helm

on:
  pull_request:
    types: [closed]
    branches: [main, master]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1  # Match your terraform variable

jobs:
  deploy:
    name: Deploy to EKS
    # Only run when a PR is actually merged (not just closed)
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tags
        id: tags
        run: |
          echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "grafana_image=${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_GRAFANA_REPO }}:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "prometheus_image=${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_PROMETHEUS_REPO }}:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: "3.14.0"

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ secrets.EKS_CLUSTER_NAME }}

      - name: Deploy with Helm
        run: |
          helm upgrade --install gameserver-monitoring ./helm/gameserver-monitoring \
            --namespace monitoring \
            --create-namespace \
            --set grafana.image.repository=${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_GRAFANA_REPO }} \
            --set grafana.image.tag=${{ github.sha }} \
            --set prometheus.image.repository=${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_PROMETHEUS_REPO }} \
            --set prometheus.image.tag=${{ github.sha }} \
            --set grafana.adminPassword=${{ secrets.GRAFANA_ADMIN_PASSWORD }} \
            --wait \
            --timeout 18m

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/grafana -n monitoring
          kubectl rollout status deployment/prometheus -n monitoring

      - name: Print Grafana LoadBalancer URL
        run: |
          echo "Grafana URL:"
          kubectl get svc grafana-service -n monitoring \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'
