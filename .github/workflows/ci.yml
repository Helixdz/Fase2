name: CI — Build & Push to ECR

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  id-token: write   # Required for OIDC auth with AWS
  contents: read

env:
  AWS_REGION: us-east-1  # Change to match your terraform var

jobs:
  build-and-push:
    name: Build Docker Images & Push to ECR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Authenticate to AWS using OIDC (no long-lived secrets needed)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Grafana ──────────────────────────────────────────────────────────
      - name: Build & push Grafana image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPO: ${{ secrets.ECR_GRAFANA_REPO }}   # e.g. gameserver-monitoring/grafana
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$REPO:$IMAGE_TAG -t $REGISTRY/$REPO:latest \
            ./docker/grafana
          docker push $REGISTRY/$REPO:$IMAGE_TAG
          docker push $REGISTRY/$REPO:latest
          echo "grafana_image=$REGISTRY/$REPO:$IMAGE_TAG" >> $GITHUB_OUTPUT
        id: grafana-build

      # ── Prometheus ───────────────────────────────────────────────────────
      - name: Build & push Prometheus image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPO: ${{ secrets.ECR_PROMETHEUS_REPO }}  # e.g. gameserver-monitoring/prometheus
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$REPO:$IMAGE_TAG -t $REGISTRY/$REPO:latest \
            ./docker/prometheus
          docker push $REGISTRY/$REPO:$IMAGE_TAG
          docker push $REGISTRY/$REPO:latest
          echo "prometheus_image=$REGISTRY/$REPO:$IMAGE_TAG" >> $GITHUB_OUTPUT
        id: prometheus-build

    outputs:
      grafana_image: ${{ steps.grafana-build.outputs.grafana_image }}
      prometheus_image: ${{ steps.prometheus-build.outputs.prometheus_image }}
